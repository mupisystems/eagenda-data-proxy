services:
  proxy:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data_proxy_config.yml:/app/data_proxy_config.yml:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: eagendas_pii
      POSTGRES_USER: proxy
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proxy"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    ports:
      - "6380:6379"

  worker:
    build: .
    env_file: .env
    volumes:
      - ./data_proxy_config.yml:/app/data_proxy_config.yml:ro
    depends_on:
      - db
      - redis
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4

  beat:
    build: .
    env_file: .env
    volumes:
      - ./data_proxy_config.yml:/app/data_proxy_config.yml:ro
    depends_on:
      - db
      - redis
    command: celery -A app.tasks.celery_app beat --loglevel=info

volumes:
  pgdata:
  redisdata:
