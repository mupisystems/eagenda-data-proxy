# eagendas Data Proxy Configuration
# Environment variables can be referenced with ${VAR_NAME} syntax

eagendas:
  # Region determines the datacenter: BR (Brazil) or US (United States)
  # BR      → https://eagenda.com.br/api/v3
  # US      → https://eagendas.com/api/v3
  # HOMOLOG → https://homolog.eagendas.com/api/v3
  region: "${EAGENDAS_REGION}"
  # Override base_url to use a custom endpoint (takes precedence over region)
  base_url: "${EAGENDAS_API_URL}"
  api_token: "${EAGENDAS_API_TOKEN}"
  timeout: 30
  retry_attempts: 3
  retry_backoff: 2

proxy:
  host: "0.0.0.0"
  port: 8000
  debug: false
  log_level: "INFO"

database:
  url: "${DATABASE_URL}"
  url_sync: "${DATABASE_URL_SYNC}"

redis:
  url: "${REDIS_URL}"

pii:
  pseudonym_prefix: "${PII_PSEUDONYM_PREFIX}"
  fields_to_strip:
    person:
      - name
      - email
      - phone
      - identification_code
      - identification_type
      - date_of_birth
  questionnaire:
    # Question types whose answers are classified as PII (eagenda question types)
    pii_types:
      - text
      - short-text
    # Pseudonym for redacted text answers sent to cloud
    redacted_placeholder: "[REDACTED]"

notifications:
  email:
    enabled: true
    smtp_host: "${SMTP_HOST}"
    smtp_port: 587
    smtp_user: "${SMTP_USER}"
    smtp_password: "${SMTP_PASSWORD}"
    from_address: "${SMTP_FROM}"
    from_name: "${SMTP_FROM_NAME}"
  sms:
    enabled: false
    provider: "${SMS_PROVIDER}"       # twilio, vonage
    api_key: "${SMS_API_KEY}"
    api_secret: "${SMS_API_SECRET}"
    from_number: "${SMS_FROM_NUMBER}"
  whatsapp:
    enabled: false
    provider: "${WHATSAPP_PROVIDER}"  # evolution, meta
    api_url: "${WHATSAPP_API_URL}"
    api_key: "${WHATSAPP_API_KEY}"
    from_number: "${WHATSAPP_FROM_NUMBER}"

webhook_relay:
  target_url: "${WEBHOOK_RELAY_TARGET}"
  auth_header: "${WEBHOOK_RELAY_AUTH}"
  retry_max: 5
  retry_delay: 60

admin:
  enabled: true
  path: "/admin"
  secret_key: "${ADMIN_SECRET_KEY}"

audit:
  retention_days: 365
  enable_access_logging: true
