# eagendas Data Proxy Configuration
# Environment variables can be referenced with ${VAR_NAME} syntax

eagendas:
  base_url: "${EAGENDAS_API_URL}"
  api_token: "${EAGENDAS_API_TOKEN}"
  timeout: 30
  retry_attempts: 3
  retry_backoff: 2

proxy:
  host: "0.0.0.0"
  port: 8000
  debug: false
  log_level: "INFO"

database:
  url: "${DATABASE_URL}"
  url_sync: "${DATABASE_URL_SYNC}"

redis:
  url: "${REDIS_URL}"

pii:
  pseudonym_prefix: "${PII_PSEUDONYM_PREFIX}"
  fields_to_strip:
    person:
      - name
      - email
      - phone
      - identification_code
      - identification_type
      - date_of_birth
  questionnaire:
    # Question types whose answers are classified as PII
    pii_types:
      - text
      - short-text
      - paragraph
    # Pseudonym for redacted text answers sent to cloud
    redacted_placeholder: "[REDACTED]"

notifications:
  email:
    enabled: true
    smtp_host: "${SMTP_HOST}"
    smtp_port: 587
    smtp_user: "${SMTP_USER}"
    smtp_password: "${SMTP_PASSWORD}"
    from_address: "${SMTP_FROM}"
    from_name: "${SMTP_FROM_NAME}"
  sms:
    enabled: false
  whatsapp:
    enabled: false

webhook_relay:
  target_url: "${WEBHOOK_RELAY_TARGET}"
  auth_header: "${WEBHOOK_RELAY_AUTH}"
  retry_max: 5
  retry_delay: 60

admin:
  enabled: true
  path: "/admin"
  secret_key: "${ADMIN_SECRET_KEY}"

audit:
  retention_days: 365
  enable_access_logging: true
